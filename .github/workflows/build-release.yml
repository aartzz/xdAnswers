name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build extensions for Firefox and Chrome
        run: |
          npm run build:firefox
          npm run build:chrome

      - name: Generate Release Body
        id: generate_release_body
        run: |
          # Отримуємо попередній тег. Якщо його немає, беремо перший коміт в історії.
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "tags/${{ github.ref_name }}~1" 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Previous tag: $PREVIOUS_TAG"

          # Створюємо список комітів у потрібному форматі: "* назва (id)"
          CHANGELOG=$(git log $PREVIOUS_TAG...${{ github.ref_name }} --pretty=format:'* %s (%h)')

          # Офіційний спосіб передачі багаторядкового тексту через Environment File
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Locate build artifacts
        id: artifacts
        run: |
          firefox_path=$(find build -name "*.xpi" | head -n 1)
          chrome_path=$(find build -name "xdAnswers-chrome-*.zip" -o -name "xdanswers-chrome-*.zip" | head -n 1)

          if [ -z "$firefox_path" ]; then
            echo "::error::Firefox .xpi artifact not found in build/ directory."
            exit 1
          fi
          if [ -z "$chrome_path" ]; then
            echo "::error::Chrome .zip artifact not found in build/ directory."
            exit 1
          fi

          # Нормалізуємо імена файлів, щоб користувач у Releases бачив узгоджені назви
          tag="${{ github.ref_name }}"
          firefox_final="build/xdAnswers-firefox-${tag}.xpi"
          chrome_final="build/xdAnswers-chrome-${tag}.zip"
          mv "$firefox_path" "$firefox_final"
          mv "$chrome_path"  "$chrome_final"

          echo "firefox=$firefox_final" >> "$GITHUB_OUTPUT"
          echo "chrome=$chrome_final"   >> "$GITHUB_OUTPUT"

      - name: Create Release and upload artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.generate_release_body.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            ${{ steps.artifacts.outputs.firefox }}
            ${{ steps.artifacts.outputs.chrome }}
