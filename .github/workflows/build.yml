name: Debug

on:
  push:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build extensions for Firefox and Chrome
        run: |
          npm run build:firefox:debug
          npm run build:chrome:debug

      - name: Locate build artifacts
        id: artifacts
        run: |
          firefox_path=$(find build -name "*.xpi" | head -n 1)
          chrome_path=$(find build -name "xdAnswers-chrome-*.zip" -o -name "xdanswers-chrome-*.zip" | head -n 1)

          if [ -z "$firefox_path" ]; then
            echo "::error::Firefox .xpi artifact not found in build/ directory."
            exit 1
          fi
          if [ -z "$chrome_path" ]; then
            echo "::error::Chrome .zip artifact not found in build/ directory."
            exit 1
          fi

          echo "firefox=$firefox_path" >> "$GITHUB_OUTPUT"
          echo "chrome=$chrome_path"   >> "$GITHUB_OUTPUT"

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v6
        with:
          name: xdAnswers-firefox
          path: ${{ steps.artifacts.outputs.firefox }}

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v6
        with:
          name: xdAnswers-chrome
          path: ${{ steps.artifacts.outputs.chrome }}
